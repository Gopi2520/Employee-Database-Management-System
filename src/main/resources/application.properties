## Use the platform-provided PORT when available to avoid absolute redirects to localhost
server.port=${PORT:8081}

# Enable forwarded headers handling so Spring builds redirect URLs using the external host
# (useful when running behind a proxy/load-balancer like Render)
server.forward-headers-strategy=framework

# Database connection (values pulled from Render environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB