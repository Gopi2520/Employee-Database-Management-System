## Use the platform-provided PORT when available to avoid absolute redirects to localhost
server.port=${PORT:8081}

# Enable forwarded headers handling so Spring builds redirect URLs using the external host
# (useful when running behind a proxy/load-balancer like Render)
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB