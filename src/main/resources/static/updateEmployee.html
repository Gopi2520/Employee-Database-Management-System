<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee</title>
    <link rel="stylesheet" href="./dummy.css">
</head>

<body>
    <!-- Step 1: Enter ID and click load -->
    <label>Enter the Employee ID:</label>
    <input type="number" id="empId" name="empId" required>
    <button type="button" id="loadBtn">LOAD EMPLOYEE</button>
    <br><br>

    <!-- Step 2: Hidden form, shown only after load -->
    <div id="updateFormContainer" style="display:none;">
        <form id="employeeForm">
            <label>First Name:</label>
            <input type="text" id="fname" name="fname" required><br><br>

            <label>Last Name:</label>
            <input type="text" id="lname" name="lname" required><br><br>

            <label>Contact:</label>
            <input type="text" id="contact" name="contact" required><br><br>

            <label>Email:</label>
            <input type="email" id="mail" name="mail" required><br><br>

            <label>Age:</label>
            <input type="number" id="age" name="age" required><br><br>

            <label>Sex:</label>
            <input type="text" id="sex" name="sex" required><br><br>

            <label>Degree:</label>
            <input type="text" id="degree" name="degree" required><br><br>

            <label>Role:</label>
            <input type="text" id="role" name="role" required><br><br>

            <label>Salary:</label>
            <input type="number" id="salary" name="salary" step="0.01" required><br><br>

            <label>Image:</label>
            <input type="file" id="img" name="img" accept="image/*"><br>
            <img id="imgPreview" style="max-width:150px; display:none;" alt="Employee Image Preview"><br><br>

            <button type="button" id="updateBtn">UPDATE EMPLOYEE</button>
            <button type="reset">RESET</button>
        </form>
    </div>

    <div id="UPemployeeDetails" class="card"></div>

    <script src="dummy.js"></script>
</body>

</html>
